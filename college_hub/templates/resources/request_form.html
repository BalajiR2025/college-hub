<!DOCTYPE html>
<html>
<head>
    <title>New Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% include 'base.html' %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h4 class="mb-4">Request a Resource</h4>
            <div class="card p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select name="subject" class="form-select" required>
                            {% for subject in form.subject.field.queryset %}
                            <option value="{{ subject.pk }}">{{ subject }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">What do you need?</label>
                        <textarea name="description" class="form-control" rows="4"
                            placeholder="e.g. DBMS Unit 3 notes, Operating Systems PYQ 2023..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit Request</button>
                    <a href="/requests/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
